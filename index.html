<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sorry ❤️</title>
  <style>
    body{
      margin:0; height:100vh; display:flex; align-items:center; justify-content:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: #0b0f19; color: #fff; text-align:center;
    }
    .card{
      width:min(560px, 92vw);
      padding:34px 22px;
      border-radius:18px;
      background: rgba(255,255,255,0.06);
      box-shadow: 0 14px 40px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.10);
    }
    h1{ margin:0 0 10px; font-size:56px; letter-spacing:2px; }
    p{ margin:0 0 18px; font-size:18px; opacity:.9; line-height:1.4; }
    .btns{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:6px; }
    button{
      padding:12px 18px; border:0; border-radius:12px; cursor:pointer;
      font-size:16px; font-weight:600;
    }
    .primary{ background:#fff; color:#0b0f19; }
    .ghost{ background:transparent; color:#fff; border:1px solid rgba(255,255,255,0.25); }
    .tiny{ margin-top:14px; font-size:13px; opacity:.65; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1 id="title">SORRY!</h1>
    <p id="msg"></p>
    <div class="btns">
      <button class="primary" id="okBtn">OK</button>
    </div>
    <div class="tiny">tap OK 👆</div>
  </div>

  <script>
    let step = 0;

    const title = document.getElementById("title");
    const msg = document.getElementById("msg");
    const okBtn = document.getElementById("okBtn");
    const card = document.getElementById("card");

    function showSorry() {
      title.textContent = "SORRY!";
      msg.textContent = "🥺";
      card.querySelector(".btns").innerHTML = `<button class="primary" id="okBtn2">OK</button>`;
      document.getElementById("okBtn2").onclick = next;
    }

    function showStillAngry() {
      title.textContent = "Still angry?";
      msg.textContent = "😔";
      card.querySelector(".btns").innerHTML = `
        <button class="ghost" id="yesBtn">Yes</button>
        <button class="primary" id="noBtn">No</button>
      `;
      document.getElementById("yesBtn").onclick = () => { showSorry(); };
      document.getElementById("noBtn").onclick = showLoveYou;
    }

    function showLoveYou() {
      title.textContent = "Love you ❤️";
      msg.textContent = "Thank you for forgiving me";
      card.querySelector(".btns").innerHTML = `<button class="primary" onclick="location.reload()">Replay</button>`;
    }

    function next() {
      step++;
      if (step === 1) showSorry();
      else if (step === 2) showSorry();
      else if (step === 3) showSorry();
      else showStillAngry();
    }

    okBtn.onclick = next;
  </script>
</body>
</html>
